<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="plus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background pulse circle -->
  <circle cx="65" cy="70" r="45" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>
  <circle cx="65" cy="70" r="35" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>

  <!-- PAD text -->
  <text x="95" y="78" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="48" font-weight="700" fill="#e2e8f0" letter-spacing="6">
    PAD
  </text>

  <!-- Plus sign -->
  <g transform="translate(242, 45)">
    <line x1="14" y1="0" x2="14" y2="28" stroke="url(#plus)" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="28" y2="14" stroke="url(#plus)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- AI text -->
  <text x="280" y="78" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="48" font-weight="700" fill="#06b6d4" letter-spacing="6">
    AI
  </text>

  <!-- Pulse dots -->
  <circle cx="65" cy="70" r="2" fill="#a855f7" opacity="0.8">
    <animate attributeName="r" values="2;6;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtitle -->
  <text x="95" y="115" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#7a8a9a" letter-spacing="4" font-weight="400">
    COGNITIVE PIPELINE LAYER FOR LLMs
  </text>
</svg>
