name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy

      - name: Run Ruff
        run: ruff check backend/ tests/

      - name: Run Black
        run: black --check backend/ tests/

      - name: Run MyPy
        run: mypy backend/ --ignore-missing-imports --no-error-summary || true

      - name: Check imports
        run: |
          python -c "from backend.main import app; print('✅ Backend imports successfully')"

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run core tests (startup, migrations, auth, keys, docs)
        run: |
          python -m pytest tests/test_app_startup.py tests/test_migrations.py tests/test_auth_flow.py tests/test_keys_endpoint.py tests/test_document_upload.py -v \
            --cov=backend \
            --cov-report=term-missing \
            -x

      - name: Run fast tests
        run: |
          python -m pytest tests/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow" \
            --ignore=tests/test_app_startup.py \
            --ignore=tests/test_migrations.py \
            --ignore=tests/test_auth_flow.py \
            --ignore=tests/test_keys_endpoint.py \
            --ignore=tests/test_document_upload.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: false

  migrate-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check alembic config
        run: |
          python -c "
from pathlib import Path
assert Path('alembic.ini').exists()
assert Path('alembic/env.py').exists()
versions = list(Path('alembic/versions').glob('*.py'))
assert len(versions) >= 1, 'No migration versions found'
print(f'✅ Found {len(versions)} migration(s): {[v.name for v in versions]}')
"

      - name: Verify migration script imports
        run: |
          python -c "
import importlib.util
from pathlib import Path
migration_path = list(Path('alembic/versions').glob('*.py'))[0]
spec = importlib.util.spec_from_file_location('migration', migration_path)
mod = importlib.util.module_from_spec(spec)
spec.loader.exec_module(mod)
assert hasattr(mod, 'upgrade'), 'Migration missing upgrade()'
assert hasattr(mod, 'downgrade'), 'Migration missing downgrade()'
print(f'✅ Migration {migration_path.name}: upgrade() and downgrade() OK')
"

      - name: Verify migrate script
        run: |
          python -c "
import importlib.util
spec = importlib.util.spec_from_file_location('migrate', 'scripts/migrate.py')
mod = importlib.util.module_from_spec(spec)
spec.loader.exec_module(mod)
assert hasattr(mod, 'migrate_at_startup'), 'Missing migrate_at_startup()'
print('✅ scripts/migrate.py imports OK')
"
