repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: make-test-fast
        name: Run fast tests
        entry: make test-fast
        language: system
        pass_filenames: false
        always_run: true

      - id: make-migrate-check
        name: Check migrations
        entry: make migrate-check
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff
        name: Ruff linter
        entry: ruff check backend/ tests/
        language: system
        pass_filenames: false
        always_run: true
